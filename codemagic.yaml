workflows:
  ios-workflow:
    name: TFAS Diagnostics iOS
    max_build_duration: 60
    integrations:
      app_store_connect: TFAS App Store Connect
    environment:
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.tfasdiagnostics.app
    scripts:
      - name: Install pods
        script: pod install
      - name: Build iOS
        script: |
          xcode-project use-profiles
          xcodebuild \
            -workspace "TFAS Diagnostics.xcworkspace" \
            -scheme "TFAS Diagnostics" \
            -configuration Release \
            -archivePath build/TFASDiagnostics.xcarchive \
            archive
    artifacts:
      - build/TFASDiagnostics.xcarchive
      - "**/*.ipa"
