workflows:
  ios-workflow:
    name: TFAS Diagnostics iOS
    max_build_duration: 60
    environment:
      xcode: latest
      cocoapods: default
      groups:
        - ios_credentials
      vars:
        APP_STORE_CONNECT_KEY_IDENTIFIER: "6SMNZY595K"
        APP_STORE_CONNECT_ISSUER_ID: "23812752-455e-4554-aafe-dbd05e2a54f9"
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.tfasdiagnostics.app
    scripts:
      - name: Install pods
        script: pod install
      - name: Build iOS
        script: |
          xcode-project use-profiles
          xcodebuild \
            -workspace "TFAS Diagnostics.xcworkspace" \
            -scheme "TFAS Diagnostics" \
            -configuration Release \
            -archivePath build/TFASDiagnostics.xcarchive \
            archive
    artifacts:
      - build/TFASDiagnostics.xcarchive
      - "**/*.ipa"
